<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Japan 2026 🗾</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    const EUR_JPY = 162.5;
    const TRIP_START = new Date(2026, 4, 12);
    const CITIES = ["Osaka","Kyoto","Atami","Tokyo"];
    const DAY_CITIES = ["Osaka","Osaka","Osaka","Osaka","Kyoto","Kyoto","Kyoto","Atami","Atami","Tokyo","Tokyo","Tokyo","Tokyo","Tokyo","Tokyo","Tokyo","Abreise"];
    const TRIP_DAYS = Array.from({ length: 17 }, (_, i) => {
      const d = new Date(TRIP_START); d.setDate(d.getDate() + i);
      return { id: i, date: d.toISOString().slice(0,10), city: DAY_CITIES[i],
        label: d.toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"}) };
    });

    const TAGS = [
      { id:"food",     emoji:"🍜", label:"Restaurant & Café",  color:"#92400e", bg:"#fef3c7", border:"#f59e0b" },
      { id:"temple",   emoji:"⛩",  label:"Tempel & Schrein",   color:"#5b21b6", bg:"#ede9fe", border:"#8b5cf6" },
      { id:"nature",   emoji:"🌳", label:"Park & Natur",        color:"#065f46", bg:"#d1fae5", border:"#10b981" },
      { id:"shopping", emoji:"🛍", label:"Shopping",            color:"#9d174d", bg:"#fce7f3", border:"#ec4899" },
      { id:"culture",  emoji:"🎌", label:"Kultur & Sehensw.",  color:"#991b1b", bg:"#fee2e2", border:"#ef4444" },
      { id:"transport",emoji:"🚆", label:"Transport",           color:"#1e40af", bg:"#dbeafe", border:"#3b82f6" },
      { id:"hotel",    emoji:"🏨", label:"Unterkunft",          color:"#334155", bg:"#f1f5f9", border:"#94a3b8" },
      { id:"flight",   emoji:"✈",  label:"Flug",               color:"#0c4a6e", bg:"#e0f2fe", border:"#38bdf8" },
    ];
    const tagOf = id => TAGS.find(t=>t.id===id)||TAGS[4];
    const CITY_SCHEME = {
      Osaka:{bg:"#fff7ed",border:"#f97316",text:"#7c2d12"}, Kyoto:{bg:"#eff6ff",border:"#3b82f6",text:"#1e3a8a"},
      Atami:{bg:"#f0fdf4",border:"#22c55e",text:"#14532d"}, Tokyo:{bg:"#faf5ff",border:"#a855f7",text:"#581c87"},
      Abreise:{bg:"#fff1f2",border:"#fb7185",text:"#881337"},
    };
    const cityOf = c => CITY_SCHEME[c]||CITY_SCHEME.Tokyo;

    const FLIGHT_DB = {
      "CX570":{airline:"Cathay Pacific",from:"Frankfurt (FRA)",to:"Hongkong (HKG)",dep:"21:25",arr:"15:45+1",dur:"11h 20m",aircraft:"Boeing 777-300ER",status:"scheduled",layover:""},
      "CX531":{airline:"Cathay Pacific",from:"Hongkong (HKG)",to:"Osaka Kansai (KIX)",dep:"18:30",arr:"22:05",dur:"3h 35m",aircraft:"Airbus A330-300",status:"scheduled",layover:""},
      "CX674":{airline:"Cathay Pacific",from:"Tokyo Haneda (HND)",to:"Hongkong (HKG)",dep:"18:55",arr:"22:20",dur:"4h 25m",aircraft:"Airbus A350-900",status:"scheduled",layover:""},
      "CX291":{airline:"Cathay Pacific",from:"Hongkong (HKG)",to:"Frankfurt (FRA)",dep:"00:15",arr:"06:40+1",dur:"12h 25m",aircraft:"Boeing 777-300ER",status:"scheduled",layover:""},
      "LH741":{airline:"Lufthansa",from:"München (MUC)",to:"Tokyo Haneda (HND)",dep:"14:05",arr:"09:25+1",dur:"11h 20m",aircraft:"Boeing 747-8",status:"scheduled",layover:""},
    };
    const STATUS_LABELS={scheduled:"Planmäßig",active:"Im Flug",landed:"Gelandet",delayed:"Verspätet",cancelled:"Annulliert"};
    const STATUS_COLORS={scheduled:{bg:"#dbeafe",color:"#1e3a8a"},active:{bg:"#d1fae5",color:"#064e3b"},landed:{bg:"#f1f5f9",color:"#334155"},delayed:{bg:"#fef3c7",color:"#78350f"},cancelled:{bg:"#fee2e2",color:"#7f1d1d"}};

    const STORAGE_KEY = "japan2026_v7";
    const blank = () => ({ flights:[], hotels:[], restaurants:[], activities:[], days:[], docs:[], lastSync:null });

    async function sharedLoad(){ try{ const r=await window.storage.get(STORAGE_KEY,true); return r?JSON.parse(r.value):null; }catch{ return null; } }
    async function sharedSave(d){ try{ await window.storage.set(STORAGE_KEY,JSON.stringify({...d,lastSync:new Date().toISOString()}),true); }catch{} }

    const card={background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,padding:"14px 16px",marginBottom:10};
    const inp={width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none",background:"#fff",color:"#111827"};
    const PRI={padding:"8px 16px",borderRadius:8,border:"none",background:"#111827",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500,fontFamily:"inherit"};
    const SEC={padding:"8px 16px",borderRadius:8,border:"1px solid #d1d5db",background:"#fff",color:"#374151",cursor:"pointer",fontSize:13,fontFamily:"inherit"};

    const CityBadge=({city})=>{const c=cityOf(city);return <span style={{fontSize:11,padding:"2px 8px",borderRadius:999,background:c.bg,color:c.text,border:`1px solid ${c.border}40`,fontWeight:500,marginLeft:6}}>{city}</span>;};
    const MapBtn=({name,lat,lng})=>{const url=lat&&lng?`https://www.google.com/maps?q=${lat},${lng}`:`https://www.google.com/maps/search/${encodeURIComponent((name||"")+" Japan")}`;return <a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#2563eb",textDecoration:"none"}}>📍 Karte</a>;};
    const PriceTag=({jpy,eur})=>{if(!jpy&&!eur)return null;const j=jpy||Math.round(eur*EUR_JPY);const e=eur||(jpy/EUR_JPY).toFixed(0);return <span style={{fontSize:12,color:"#6b7280"}}>¥{Number(j).toLocaleString()} <span style={{opacity:.6}}>≈ €{Number(e).toFixed(0)}</span></span>;};
    const F=({label,children,half})=>(<div style={{marginBottom:10,flex:half?"1 1 calc(50% - 4px)":"1 1 100%",minWidth:half?0:undefined}}><label style={{display:"block",fontSize:11,color:"#6b7280",marginBottom:3}}>{label}</label>{children}</div>);

    function Panel({title,onClose,children}){
      return <div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:14,padding:20,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontWeight:500,fontSize:15,color:"#111827"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#9ca3af",lineHeight:1,padding:0}}>✕</button>
        </div>
        {children}
      </div>;
    }

    // ── AI (via Vercel proxy) ─────────────────────────────────────────────────
    const PROXY = "/api/proxy";

    const SYSTEM_PROMPT = `Du bist ein Reiseplanungs-Assistent für eine Japanreise (12.–28. Mai 2026, Städte: Osaka, Kyoto, Atami, Tokyo).
Extrahiere strukturierte Daten und gib NUR ein JSON-Objekt zurück, KEIN Markdown, KEINE Erklärung.

Reise-Tage (dayId 0-16): 0=12.Mai(Osaka),1=13.Mai(Osaka),2=14.Mai(Osaka),3=15.Mai(Osaka),4=16.Mai(Kyoto),5=17.Mai(Kyoto),6=18.Mai(Kyoto),7=19.Mai(Atami),8=20.Mai(Atami),9=21.Mai(Tokyo),10=22.Mai(Tokyo),11=23.Mai(Tokyo),12=24.Mai(Tokyo),13=25.Mai(Tokyo),14=26.Mai(Tokyo),15=27.Mai(Tokyo),16=28.Mai(Abreise)

Tags: food, temple, nature, shopping, culture, transport, hotel, flight

Format:
{"message":"Bestätigung auf Deutsch","actions":[{"type":"activity|restaurant|hotel|flight|dayentry","data":{...}}]}

Felder:
- activity: name, city, tag, address, lat(string), lng(string), openHours, closedDay, priceJPY, note
- restaurant: name, city, address, lat(string), lng(string), openHours, closedDay, priceJPY, note, reserved(false)
- hotel: name, city, address, lat(string), lng(string), checkin, checkout, nights, priceJPY, note
- flight: flightNumber, airline, from, to, dep, arr, dur, aircraft, status(scheduled), layover, date, note
- dayentry: title, dayId(0-16), time, tag, note

WICHTIG: Kein date/time bei activities/restaurants außer explizit genannt. Stadt aus Kontext ableiten (Fushimi Inari→Kyoto, Dotonbori→Osaka, Senso-ji→Tokyo). Lat/Lng als String.`;

    async function callProxy(body){
      const res=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error||`HTTP ${res.status}`); }
      return res.json();
    }

    function extractFromGmapsUrl(url){
      if(!url) return {};
      const p=url.match(/\/place\/([^/@]+)/);
      const name=p?decodeURIComponent(p[1].replace(/\+/g," ")):null;
      const lat=url.match(/!3d([-\d.]+)/)?.[1];
      const lng=url.match(/!4d([-\d.]+)/)?.[1];
      return {name,lat,lng};
    }

    async function resolveViaWebSearch(shortUrl){
      const data=await callProxy({model:"claude-sonnet-4-20250514",max_tokens:512,
        system:`Resolve a Google Maps URL via web_search. Return ONLY JSON: {"name":"...","lat":"...","lng":"...","city":"...","address":"...","openHours":"...","tag":"temple"} or {"error":"not found"}. tag: food/temple/nature/shopping/culture/transport/hotel.`,
        messages:[{role:"user",content:`Resolve: ${shortUrl}`}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      });
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const m=txt.match(/\{[^{}]*\}/);
      if(!m) return null;
      const p=JSON.parse(m[0]);
      return p.error?null:p;
    }

    async function callAI(userMsg,history){
      const shortLinks=[...(userMsg.match(/https?:\/\/maps\.app\.goo\.gl\/\S+/g)||[])];
      const fullLinks=[...(userMsg.match(/https?:\/\/(?:www\.)?google\.[a-z.]+\/maps\/\S+/g)||[])];
      let extra="";
      for(const link of shortLinks){
        try{ const i=await resolveViaWebSearch(link); if(i) extra+=`\n[RESOLVED: ${link}] Name:${i.name}, City:${i.city}, Lat:${i.lat}, Lng:${i.lng}, Hours:${i.openHours||""}, Tag:${i.tag} → Eintrag direkt erstellen.`; }catch{}
      }
      for(const link of fullLinks){
        const i=extractFromGmapsUrl(link); if(i.name) extra+=`\n[GMAPS] Name="${i.name}", lat=${i.lat}, lng=${i.lng}.`;
      }
      const data=await callProxy({model:"claude-sonnet-4-20250514",max_tokens:4000,system:SYSTEM_PROMPT,
        messages:[...history,{role:"user",content:userMsg+(extra?extra:"")}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      });
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const matches=[...txt.matchAll(/\{[\s\S]*?\}(?=\s*(?:\{|$))/g)];
      let parsed=null;
      for(let i=matches.length-1;i>=0;i--){ try{ const c=JSON.parse(matches[i][0]); if(c.message&&Array.isArray(c.actions)){parsed=c;break;} }catch{} }
      if(!parsed){ try{ const m=txt.replace(/```json?|```/g,"").trim().match(/\{[\s\S]*\}/); if(m) parsed=JSON.parse(m[0]); }catch{} }
      if(!parsed) throw new Error("Ungültige KI-Antwort");
      return {parsed};
    }

    function AIAssistant({data,onApply}){
      const [input,setInput]=useState("");
      const [loading,setLoading]=useState(false);
      const [history,setHistory]=useState([]);
      const [chatLog,setChatLog]=useState([]);
      const chatRef=useRef();
      const examples=["Fushimi Inari Taisha, Kyoto","Ichiran Ramen Dotonbori, Osaka","Flug CX570 am 12. Mai","TeamLab Planets Tokyo, 25€","Tsukiji Outer Market, Tokyo","Arashiyama Bambushain, Kyoto"];
      const send=async()=>{
        if(!input.trim()||loading) return;
        const msg=input.trim(); setInput(""); setLoading(true);
        setChatLog(l=>[...l,{role:"user",text:msg}]);
        try{
          const {parsed}=await callAI(msg,history);
          setHistory(h=>[...h,{role:"user",content:msg},{role:"assistant",content:JSON.stringify(parsed)}]);
          setChatLog(l=>[...l,{role:"assistant",text:parsed.message,actions:parsed.actions}]);
        }catch(e){ setChatLog(l=>[...l,{role:"assistant",text:`❌ ${e.message}`,actions:[]}]); }
        setLoading(false);
        setTimeout(()=>{ if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight; },100);
      };
      const apply=actions=>{ onApply(actions); setChatLog(l=>[...l,{role:"system",text:`✓ ${actions.length} Eintrag${actions.length>1?"e":""} gespeichert.`}]); };
      const typeLabel=t=>({activity:"Aktivität",restaurant:"Restaurant",hotel:"Unterkunft",flight:"Flug",dayentry:"Tageseintrag"})[t]||t;
      return <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontWeight:500,fontSize:14,color:"#0c4a6e",marginBottom:6}}>KI-Assistent · Einfach eintippen</div>
          <div style={{fontSize:12,color:"#0369a1",lineHeight:1.6}}>Ortsnamen, Google Maps Links, Flugnummern – der Assistent erkennt alles automatisch.</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{examples.map((e,i)=><button key={i} onClick={()=>setInput(e)} style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:20,padding:"4px 11px",fontSize:11,color:"#6b7280",cursor:"pointer",fontFamily:"inherit"}}>{e}</button>)}</div>
        {chatLog.length>0&&<div ref={chatRef} style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>
          {chatLog.map((m,i)=><div key={i} style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="user"&&<div style={{background:"#111827",color:"#fff",borderRadius:"12px 12px 2px 12px",padding:"8px 13px",fontSize:13,maxWidth:"80%"}}>{m.text}</div>}
            {m.role==="assistant"&&<div style={{maxWidth:"90%"}}>
              <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:"2px 12px 12px 12px",padding:"8px 13px",fontSize:13,color:"#111827",marginBottom:6}}>{m.text}</div>
              {m.actions?.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {m.actions.map((a,j)=>{const tag=tagOf(a.data?.tag);return <div key={j} style={{background:"#f9fafb",border:`1px solid ${tag.border}40`,borderRadius:10,padding:"8px 12px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    <span style={{fontSize:14}}>{tag.emoji}</span>
                    <span style={{fontWeight:500,fontSize:13}}>{a.data?.name||a.data?.title||a.data?.flightNumber}</span>
                    <span style={{fontSize:11,padding:"1px 7px",borderRadius:999,background:"#f3f4f6",color:"#6b7280"}}>{typeLabel(a.type)}</span>
                    {a.data?.city&&<CityBadge city={a.data.city}/>}
                  </div>
                  {a.data?.openHours&&<div style={{fontSize:11,color:"#059669"}}>⏰ {a.data.openHours}</div>}
                  {a.data?.priceJPY&&<div style={{fontSize:11,color:"#6b7280"}}>¥{Number(a.data.priceJPY).toLocaleString()}</div>}
                  {a.data?.note&&<div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{a.data.note}</div>}
                </div>;})}
                <button onClick={()=>apply(m.actions)} style={{...PRI,fontSize:12,padding:"6px 14px",alignSelf:"flex-start"}}>✓ {m.actions.length} Eintrag{m.actions.length>1?"e":""} speichern</button>
              </div>}
            </div>}
            {m.role==="system"&&<div style={{fontSize:12,color:"#059669",padding:"4px 0",alignSelf:"center"}}>{m.text}</div>}
          </div>)}
          {loading&&<div style={{background:"#f3f4f6",borderRadius:12,padding:"8px 14px",fontSize:13,color:"#9ca3af",alignSelf:"flex-start"}}>Analysiere…</div>}
        </div>}
        <div style={{display:"flex",gap:8}}>
          <input style={{...inp,flex:1,borderRadius:24,padding:"10px 16px"}} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ort, Google Maps Link, Flug… (Enter)" disabled={loading}/>
          <button onClick={send} disabled={loading||!input.trim()} style={{...PRI,borderRadius:24,padding:"10px 18px",opacity:(!input.trim()||loading)?0.5:1}}>{loading?"…":"→"}</button>
        </div>
      </div>;
    }

    function FlightForm({initial,onSave,onClose}){
      const init={flightNumber:"",date:"",airline:"",from:"",to:"",dep:"",arr:"",dur:"",aircraft:"",layover:"",status:"scheduled",note:""};
      const [f,setF]=useState(initial?{...init,...initial}:init);
      const [loading,setLoading]=useState(false);
      const [msg,setMsg]=useState("");
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const lookup=async()=>{
        const fn=f.flightNumber.toUpperCase().replace(/\s/g,"");
        if(FLIGHT_DB[fn]){setF(p=>({...p,...FLIGHT_DB[fn],flightNumber:fn}));setMsg("Daten geladen.");return;}
        setLoading(true);setMsg("");
        try{
          const data=await callProxy({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:`Return ONLY raw JSON for flight ${fn} on ${f.date||"2026-05-12"}. Fields: airline,from,to,dep,arr,dur,aircraft,status,layover.`}]});
          const txt=(data.content?.find(b=>b.type==="text")?.text||"").replace(/```json?|```/g,"").trim();
          setF(p=>({...p,...JSON.parse(txt)}));setMsg("Flugdaten geladen.");
        }catch{setMsg("Nicht gefunden – bitte manuell ausfüllen.");}
        setLoading(false);
      };
      return <>
        <div style={{display:"flex",gap:8}}><F label="Flugnummer" half><input style={inp} value={f.flightNumber} onChange={e=>set("flightNumber",e.target.value.toUpperCase())} placeholder="CX570"/></F><F label="Datum" half><input style={inp} type="date" value={f.date} onChange={e=>set("date",e.target.value)}/></F></div>
        <button onClick={lookup} disabled={loading} style={{...PRI,width:"100%",marginBottom:8,opacity:loading?0.65:1}}>{loading?"Lade…":"Flugdaten automatisch laden"}</button>
        {msg&&<div style={{fontSize:12,color:"#6b7280",marginBottom:10,textAlign:"center"}}>{msg}</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          <F label="Airline" half><input style={inp} value={f.airline} onChange={e=>set("airline",e.target.value)}/></F>
          <F label="Status" half><select style={inp} value={f.status} onChange={e=>set("status",e.target.value)}>{Object.entries(STATUS_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></F>
          <F label="Von" half><input style={inp} value={f.from} onChange={e=>set("from",e.target.value)}/></F>
          <F label="Nach" half><input style={inp} value={f.to} onChange={e=>set("to",e.target.value)}/></F>
          <F label="Abflug" half><input style={inp} value={f.dep} onChange={e=>set("dep",e.target.value)} placeholder="21:25"/></F>
          <F label="Ankunft" half><input style={inp} value={f.arr} onChange={e=>set("arr",e.target.value)} placeholder="15:45+1"/></F>
          <F label="Dauer" half><input style={inp} value={f.dur} onChange={e=>set("dur",e.target.value)} placeholder="11h 20m"/></F>
          <F label="Flugzeugtyp" half><input style={inp} value={f.aircraft} onChange={e=>set("aircraft",e.target.value)}/></F>
          <F label="Zwischenstopp"><input style={inp} value={f.layover||""} onChange={e=>set("layover",e.target.value)}/></F>
          <F label="Notiz"><textarea style={{...inp,height:48,resize:"vertical"}} value={f.note||""} onChange={e=>set("note",e.target.value)}/></F>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}><button style={SEC} onClick={onClose}>Abbrechen</button><button style={PRI} onClick={()=>onSave(f)}>Speichern</button></div>
      </>;
    }

    function PlaceForm({initial,type,onSave,onClose}){
      const defTag={hotel:"hotel",restaurant:"food",activity:"culture"};
      const [f,setF]=useState(initial?{...initial}:{name:"",city:"Osaka",address:"",lat:"",lng:"",tag:defTag[type],priceJPY:"",priceEUR:"",note:"",reserved:false,openHours:"",closedDay:"",checkin:"",checkout:"",nights:""});
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const tagFilter={hotel:["hotel"],restaurant:["food"],activity:["temple","nature","shopping","culture","transport"]};
      return <>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          <F label="Name"><input style={inp} value={f.name} onChange={e=>set("name",e.target.value)} placeholder={type==="hotel"?"Cross Hotel Osaka":type==="restaurant"?"Ichiran Ramen":"Fushimi Inari"}/></F>
          <F label="Stadt" half><select style={inp} value={f.city} onChange={e=>set("city",e.target.value)}>{CITIES.map(c=><option key={c}>{c}</option>)}</select></F>
          <F label="Kategorie" half><select style={inp} value={f.tag} onChange={e=>set("tag",e.target.value)}>{TAGS.filter(t=>tagFilter[type].includes(t.id)).map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}</select></F>
          <F label="Adresse"><input style={inp} value={f.address||""} onChange={e=>set("address",e.target.value)}/></F>
          <F label="Lat" half><input style={inp} value={f.lat||""} onChange={e=>set("lat",e.target.value)} placeholder="34.6937"/></F>
          <F label="Lng" half><input style={inp} value={f.lng||""} onChange={e=>set("lng",e.target.value)} placeholder="135.5023"/></F>

    function Timeline({dayId,data,onAdd,onRemove}){
      const day=TRIP_DAYS[dayId]; const all=[];
      (data.flights||[]).forEach(f=>{
        if(f.date===day.date) all.push({time:f.dep||"",emoji:"✈",label:`${f.flightNumber}: ${f.from} → ${f.to}`,sub:f.dur,color:"#0284c7",bg:"#e0f2fe"});
        else if(f.arr?.includes("+1")&&f.date){const nd=new Date(f.date+"T00:00");nd.setDate(nd.getDate()+1);if(nd.toISOString().slice(0,10)===day.date) all.push({time:f.arr.replace("+1","").trim(),emoji:"✈",label:`${f.flightNumber} landet: ${f.to}`,sub:`Ankunft aus ${f.from}`,color:"#0284c7",bg:"#e0f2fe"});}
      });
      (data.hotels||[]).filter(h=>h.checkin===day.date).forEach(h=>all.push({time:"15:00",emoji:"🏨",label:`Check-in: ${h.name}`,sub:h.city,color:"#475569",bg:"#f1f5f9"}));
      (data.hotels||[]).filter(h=>h.checkout===day.date).forEach(h=>all.push({time:"11:00",emoji:"🏨",label:`Check-out: ${h.name}`,sub:h.city,color:"#475569",bg:"#f1f5f9"}));
      (data.days||[]).filter(e=>e.dayId===dayId).forEach(e=>{
        const t=tagOf(e.tag);
        const linked=(data.activities||[]).find(a=>a.id===e.linkedId)||(data.restaurants||[]).find(r=>r.id===e.linkedId);
        all.push({time:e.time||"",emoji:t.emoji,label:e.title,sub:e.note,color:t.color,bg:t.bg,linked,id:e.id,manual:true});
      });
      all.sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
      const slotOf=t=>!t||t<"12:00"?0:t<"17:00"?1:2;
      const slots=[["🌅","Vormittag"],["☀️","Nachmittag"],["🌙","Abend"]];

    function App(){
      const [tab,setTab]=useState("ai");
      const [data,setData]=useState(blank());
      const [panel,setPanel]=useState(null);
      const [selDay,setSelDay]=useState(0);
      const [filterTag,setFilterTag]=useState(null);
      const [syncing,setSyncing]=useState(false);
      const [syncOk,setSyncOk]=useState(false);

      const load=useCallback(async()=>{ const d=await sharedLoad(); if(d) setData(d); },[]);
      useEffect(()=>{ load(); const t=setInterval(load,25000); return()=>clearInterval(t); },[load]);

      const save=async next=>{ setSyncing(true);setSyncOk(false);setData(next);await sharedSave(next);setSyncing(false);setSyncOk(true);setTimeout(()=>setSyncOk(false),3000); };
      const upsert=(col,item)=>{ const exists=(data[col]||[]).find(x=>x.id===item.id); save({...data,[col]:exists?data[col].map(x=>x.id===item.id?item:x):[...(data[col]||[]),{...item,id:item.id||Date.now()}]}); setPanel(null); };
      const remove=(col,id)=>{ if(!confirm("Löschen?"))return; save({...data,[col]:(data[col]||[]).filter(x=>x.id!==id)}); };
      const openPanel=(type,item=null)=>setPanel({type,item});
      const promote=act=>{ setTab("days"); setTimeout(()=>openPanel("dayentry",{title:act.name,tag:act.tag,linkedId:act.id,note:act.note||""}),50); };

      // ── BIDIRECTIONAL: dayentry → also creates activity if no linkedId
      const saveDayEntry=(entry)=>{
        const id=entry.id||Date.now();
        const newEntry={...entry,id};
        let next={...data};
        const existsDay=(next.days||[]).find(x=>x.id===id);
        next={...next,days:existsDay?next.days.map(x=>x.id===id?newEntry:x):[...(next.days||[]),newEntry]};
        const actTags=["temple","nature","shopping","culture","transport","food"];
        if(!entry.linkedId&&actTags.includes(entry.tag)&&entry.title.trim()){
          const city=TRIP_DAYS[entry.dayId]?.city||"Tokyo";
          const actId=id+1;
          const act={id:actId,name:entry.title,city,tag:entry.tag,note:entry.note||"",address:"",lat:"",lng:"",openHours:"",closedDay:"",priceJPY:"",priceEUR:"",_fromDay:id};
          const linked={...newEntry,linkedId:actId};
          next={...next,days:next.days.map(x=>x.id===id?linked:x),activities:[...(next.activities||[]),act]};
        }
        save(next);
        setPanel(null);
      };

      // ── APPLY AI ACTIONS (also bidirectional)
      const applyActions=(actions)=>{
        let next={...data};
        const actTags=["temple","nature","shopping","culture","transport","food"];
        actions.forEach(a=>{
          const id=Date.now()+Math.random();
          if(a.type==="activity") next={...next,activities:[...(next.activities||[]),{...a.data,id}]};
          else if(a.type==="restaurant") next={...next,restaurants:[...(next.restaurants||[]),{...a.data,id}]};
          else if(a.type==="hotel") next={...next,hotels:[...(next.hotels||[]),{...a.data,id}]};
          else if(a.type==="flight") next={...next,flights:[...(next.flights||[]),{...a.data,id}]};
          else if(a.type==="dayentry"){
            if(actTags.includes(a.data.tag)&&a.data.title){
              const actId=id+0.5;
              const city=TRIP_DAYS[a.data.dayId]?.city||"Tokyo";
              const act={id:actId,name:a.data.title,city,tag:a.data.tag,note:a.data.note||"",address:"",lat:"",lng:"",openHours:"",closedDay:"",priceJPY:"",priceEUR:"",_fromDay:id};
              next={...next,activities:[...(next.activities||[]),act],days:[...(next.days||[]),{...a.data,id,linkedId:actId}]};
            } else {
              next={...next,days:[...(next.days||[]),{...a.data,id}]};
            }
          }
        });
        save(next);
      };

      const tabBtn=active=>({padding:"6px 12px",borderRadius:8,border:active?"1.5px solid #111827":"1px solid #e5e7eb",background:active?"#111827":"#fff",color:active?"#fff":"#6b7280",cursor:"pointer",fontSize:12,fontWeight:active?500:400,whiteSpace:"nowrap",fontFamily:"inherit"});

      return <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#111827",background:"#f9fafb",minHeight:"100vh",fontSize:14}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"10px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
          <span style={{fontSize:20}}>🗾</span>
          <div><div style={{fontWeight:500,fontSize:15}}>Japan 2026</div><div style={{fontSize:11,color:"#9ca3af"}}>12.–28. Mai · 2 Personen</div></div>
          <div style={{flex:1}}/>
          <div style={{fontSize:11,fontWeight:500,color:syncing?"#d97706":syncOk?"#059669":"#9ca3af"}}>{syncing?"⟳ Sync…":syncOk?"✓ Gespeichert":"Cloud-Sync aktiv"}</div>
        </div>
        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"8px 14px",display:"flex",gap:5,overflowX:"auto"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setPanel(null);}} style={tabBtn(tab===t.id)}>{t.label}</button>)}
        </div>
        {(tab==="map"||tab==="acts")&&<div style={{background:"#fff",borderBottom:"1px solid #f3f4f6",padding:"7px 14px",display:"flex",gap:5,overflowX:"auto"}}>
          <button onClick={()=>setFilterTag(null)} style={{padding:"3px 10px",borderRadius:999,border:`1px solid ${!filterTag?"#111827":"#e5e7eb"}`,background:!filterTag?"#111827":"#fff",color:!filterTag?"#fff":"#6b7280",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Alle</button>
          {TAGS.map(t=><button key={t.id} onClick={()=>setFilterTag(filterTag===t.id?null:t.id)} style={{padding:"3px 10px",borderRadius:999,border:`1px solid ${filterTag===t.id?t.border:"#e5e7eb"}`,background:filterTag===t.id?t.bg:"#fff",color:filterTag===t.id?t.color:"#6b7280",cursor:"pointer",fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.emoji} {t.label}</button>)}
        </div>}
        <div style={{padding:"14px 16px",maxWidth:780,margin:"0 auto"}}>
          {tab==="ai"&&<div style={card}><AIAssistant data={data} onApply={applyActions}/></div>}
          {tab==="days"&&<div>
            <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:12,paddingBottom:2}}>
              {TRIP_DAYS.map(d=>{const cs=cityOf(d.city);const active=selDay===d.id;return <button key={d.id} onClick={()=>{setSelDay(d.id);setPanel(null);}} style={{flexShrink:0,padding:"6px 10px",borderRadius:8,border:`1px solid ${active?cs.border:"#e5e7eb"}`,background:active?cs.bg:"#fff",color:active?cs.text:"#6b7280",cursor:"pointer",fontSize:11,fontWeight:active?500:400,fontFamily:"inherit"}}>{d.label}</button>;})}
            </div>
            {panel?.type==="dayentry"&&<Panel title="Eintrag hinzufügen" onClose={()=>setPanel(null)}><DayEntryForm initial={{...panel.item,dayId:panel.item?.dayId??selDay}} data={data} onSave={saveDayEntry} onClose={()=>setPanel(null)}/></Panel>}
            <div style={{...card,padding:"16px 18px"}}>
              <div style={{display:"flex",alignItems:"center",marginBottom:14}}><span style={{fontWeight:500,fontSize:15}}>{TRIP_DAYS[selDay].label}</span><CityBadge city={TRIP_DAYS[selDay].city}/></div>
              <Timeline dayId={selDay} data={data} onAdd={()=>openPanel("dayentry",{dayId:selDay})} onRemove={id=>remove("days",id)}/>
            </div>
          </div>}
          {tab==="flights"&&<div>
            {panel?.type==="flight"&&<Panel title={panel.item?.id?"Flug bearbeiten":"Flug hinzufügen"} onClose={()=>setPanel(null)}><FlightForm initial={panel.item} onSave={f=>upsert("flights",f)} onClose={()=>setPanel(null)}/></Panel>}
            {(data.flights||[]).length===0&&!panel&&<div style={{textAlign:"center",padding:"3rem 1rem",color:"#9ca3af"}}><div style={{fontSize:36,marginBottom:10}}>✈</div><div style={{fontSize:13}}>Noch keine Flüge. Im KI-Assistenten „CX570 am 12. Mai" eingeben.</div></div>}
            {(data.flights||[]).map(f=><FlightCard key={f.id} f={f} onEdit={x=>openPanel("flight",x)} onDelete={id=>remove("flights",id)}/>)}
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("flight")}>+ Flug manuell hinzufügen</button>}
          </div>}
          {tab==="hotels"&&<div>
            {panel?.type==="hotel"&&<Panel title={panel.item?.id?"Bearbeiten":"Hinzufügen"} onClose={()=>setPanel(null)}><PlaceForm initial={panel.item} type="hotel" onSave={h=>upsert("hotels",h)} onClose={()=>setPanel(null)}/></Panel>}
            {(data.hotels||[]).map(h=>{const cs=cityOf(h.city);return <div key={h.id} style={{...card,borderLeft:`3px solid ${cs.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",marginBottom:5}}><span style={{fontWeight:500,fontSize:14}}>🏨 {h.name}</span><CityBadge city={h.city}/></div>
                  {h.address&&<div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{h.address}</div>}
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:12,color:"#6b7280"}}>
                    {h.checkin&&<span>📅 {new Date(h.checkin+"T00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})} – {h.checkout&&new Date(h.checkout+"T00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})}</span>}
                    {h.nights&&<span>🌙 {h.nights} Nächte</span>}
                    {(h.priceJPY||h.priceEUR)&&<PriceTag jpy={h.priceJPY} eur={h.priceEUR}/>}
                  </div>
                  {h.note&&<div style={{fontSize:12,color:"#9ca3af",marginTop:5}}>{h.note}</div>}
                </div>
                <div style={{display:"flex",gap:6,marginLeft:8,flexShrink:0}}><MapBtn name={h.name} lat={h.lat} lng={h.lng}/><button onClick={()=>openPanel("hotel",h)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✎</button><button onClick={()=>remove("hotels",h.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✕</button></div>
              </div>
            </div>;})}
            {(data.hotels||[]).length===0&&!panel&&<div style={{textAlign:"center",padding:"2rem",color:"#9ca3af",fontSize:13}}>Im KI-Assistenten Hotel eingeben.</div>}
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("hotel")}>+ Unterkunft hinzufügen</button>}
          </div>}
          {tab==="rests"&&<div>
            {panel?.type==="restaurant"&&<Panel title={panel.item?.id?"Bearbeiten":"Hinzufügen"} onClose={()=>setPanel(null)}><PlaceForm initial={panel.item} type="restaurant" onSave={r=>upsert("restaurants",r)} onClose={()=>setPanel(null)}/></Panel>}
            {(data.restaurants||[]).map(r=><div key={r.id} style={{...card,borderLeft:"3px solid #f59e0b"}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:4}}><span style={{fontWeight:500,fontSize:14}}>🍜 {r.name}</span><CityBadge city={r.city}/>{r.reserved&&<span style={{fontSize:11,padding:"2px 7px",borderRadius:999,background:"#d1fae5",color:"#065f46"}}>✓ Reserviert</span>}</div>
                  {(r.priceJPY||r.priceEUR)&&<div style={{marginBottom:4}}><PriceTag jpy={r.priceJPY} eur={r.priceEUR}/></div>}
                  {r.openHours&&<div style={{fontSize:11,color:"#059669"}}>⏰ {r.openHours}{r.closedDay?` · ${r.closedDay}`:""}</div>}
                  {r.note&&<div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>{r.note}</div>}
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8}}><MapBtn name={r.name} lat={r.lat} lng={r.lng}/><button onClick={()=>openPanel("restaurant",r)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✎</button><button onClick={()=>remove("restaurants",r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✕</button></div>
              </div>
            </div>)}
            {(data.restaurants||[]).length===0&&!panel&&<div style={{textAlign:"center",padding:"2rem",color:"#9ca3af",fontSize:13}}>Im KI-Assistenten Restaurant eingeben.</div>}
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("restaurant")}>+ Restaurant hinzufügen</button>}
          </div>}
          {tab==="acts"&&<div>
            {panel?.type==="activity"&&<Panel title={panel.item?.id?"Bearbeiten":"Hinzufügen"} onClose={()=>setPanel(null)}><PlaceForm initial={panel.item} type="activity" onSave={a=>upsert("activities",a)} onClose={()=>setPanel(null)}/></Panel>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:10,marginBottom:12}}>
              {(data.activities||[]).filter(a=>!filterTag||a.tag===filterTag).map(a=>{const t=tagOf(a.tag);return <div key={a.id} style={{background:"#fff",border:`1px solid ${t.border}30`,borderRadius:12,padding:"12px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:18}}>{t.emoji}</span><div style={{display:"flex",gap:5}}><MapBtn name={a.name} lat={a.lat} lng={a.lng}/><button onClick={()=>openPanel("activity",a)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:12,padding:0}}>✎</button><button onClick={()=>remove("activities",a.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:12,padding:0}}>✕</button></div></div>
                <div style={{fontWeight:500,fontSize:13,marginBottom:4}}>{a.name}</div><CityBadge city={a.city}/>
                {a.openHours&&<div style={{fontSize:11,color:"#059669",marginTop:5}}>⏰ {a.openHours}{a.closedDay?` · ${a.closedDay}`:""}</div>}
                {(a.priceJPY||a.priceEUR)&&<div style={{marginTop:4}}><PriceTag jpy={a.priceJPY} eur={a.priceEUR}/></div>}
                {a.note&&<div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{a.note}</div>}
                <button onClick={()=>promote(a)} style={{...SEC,width:"100%",fontSize:11,padding:"5px 0",marginTop:8}}>📅 In Tagesplan</button>
              </div>;})}
              {(data.activities||[]).filter(a=>!filterTag||a.tag===filterTag).length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",color:"#9ca3af",padding:"2rem",fontSize:13}}>Im KI-Assistenten Orte eingeben.</div>}
            </div>
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("activity")}>+ Aktivität hinzufügen</button>}
          </div>}
          {tab==="map"&&<MapTab data={data} filterTag={filterTag}/>}
          {tab==="currency"&&<CurrencyTab/>}
          {tab==="docs"&&<DocsTab docs={data.docs||[]} onAdd={d=>upsert("docs",d)} onDelete={id=>remove("docs",id)}/>}
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
