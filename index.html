<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Japan 2026 🗾</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    const EUR_JPY = 162.5;
    const TRIP_START = new Date(2026, 4, 12);
    const CITIES = ["Osaka","Kyoto","Atami","Tokyo"];
    const DAY_CITIES = ["Osaka","Osaka","Osaka","Osaka","Kyoto","Kyoto","Kyoto","Atami","Atami","Tokyo","Tokyo","Tokyo","Tokyo","Tokyo","Tokyo","Tokyo","Abreise"];
    const TRIP_DAYS = Array.from({ length: 17 }, (_, i) => {
      const d = new Date(TRIP_START); d.setDate(d.getDate() + i);
      return { id: i, date: d.toISOString().slice(0,10), city: DAY_CITIES[i],
        label: d.toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"}) };
    });

    const TAGS = [
      { id:"food",     emoji:"🍜", label:"Restaurant & Café",  color:"#92400e", bg:"#fef3c7", border:"#f59e0b" },
      { id:"temple",   emoji:"⛩",  label:"Tempel & Schrein",   color:"#5b21b6", bg:"#ede9fe", border:"#8b5cf6" },
      { id:"nature",   emoji:"🌳", label:"Park & Natur",        color:"#065f46", bg:"#d1fae5", border:"#10b981" },
      { id:"shopping", emoji:"🛍", label:"Shopping",            color:"#9d174d", bg:"#fce7f3", border:"#ec4899" },
      { id:"culture",  emoji:"🎌", label:"Kultur & Sehensw.",  color:"#991b1b", bg:"#fee2e2", border:"#ef4444" },
      { id:"transport",emoji:"🚆", label:"Transport",           color:"#1e40af", bg:"#dbeafe", border:"#3b82f6" },
      { id:"hotel",    emoji:"🏨", label:"Unterkunft",          color:"#334155", bg:"#f1f5f9", border:"#94a3b8" },
      { id:"flight",   emoji:"✈",  label:"Flug",               color:"#0c4a6e", bg:"#e0f2fe", border:"#38bdf8" },
    ];
    const tagOf = id => TAGS.find(t=>t.id===id)||TAGS[4];
    const CITY_SCHEME = {
      Osaka:{bg:"#fff7ed",border:"#f97316",text:"#7c2d12"}, Kyoto:{bg:"#eff6ff",border:"#3b82f6",text:"#1e3a8a"},
      Atami:{bg:"#f0fdf4",border:"#22c55e",text:"#14532d"}, Tokyo:{bg:"#faf5ff",border:"#a855f7",text:"#581c87"},
      Abreise:{bg:"#fff1f2",border:"#fb7185",text:"#881337"},
    };
    const cityOf = c => CITY_SCHEME[c]||CITY_SCHEME.Tokyo;

    const FLIGHT_DB = {
      "CX570":{airline:"Cathay Pacific",from:"Frankfurt (FRA)",to:"Hongkong (HKG)",dep:"21:25",arr:"15:45+1",dur:"11h 20m",aircraft:"Boeing 777-300ER",status:"scheduled",layover:""},
      "CX531":{airline:"Cathay Pacific",from:"Hongkong (HKG)",to:"Osaka Kansai (KIX)",dep:"18:30",arr:"22:05",dur:"3h 35m",aircraft:"Airbus A330-300",status:"scheduled",layover:""},
      "CX674":{airline:"Cathay Pacific",from:"Tokyo Haneda (HND)",to:"Hongkong (HKG)",dep:"18:55",arr:"22:20",dur:"4h 25m",aircraft:"Airbus A350-900",status:"scheduled",layover:""},
      "CX291":{airline:"Cathay Pacific",from:"Hongkong (HKG)",to:"Frankfurt (FRA)",dep:"00:15",arr:"06:40+1",dur:"12h 25m",aircraft:"Boeing 777-300ER",status:"scheduled",layover:""},
      "LH741":{airline:"Lufthansa",from:"München (MUC)",to:"Tokyo Haneda (HND)",dep:"14:05",arr:"09:25+1",dur:"11h 20m",aircraft:"Boeing 747-8",status:"scheduled",layover:""},
    };
    const STATUS_LABELS={scheduled:"Planmäßig",active:"Im Flug",landed:"Gelandet",delayed:"Verspätet",cancelled:"Annulliert"};
    const STATUS_COLORS={scheduled:{bg:"#dbeafe",color:"#1e3a8a"},active:{bg:"#d1fae5",color:"#064e3b"},landed:{bg:"#f1f5f9",color:"#334155"},delayed:{bg:"#fef3c7",color:"#78350f"},cancelled:{bg:"#fee2e2",color:"#7f1d1d"}};

    const STORAGE_KEY = "japan2026_v9";
    const blank = () => ({ flights:[], hotels:[], restaurants:[], activities:[], days:[], docs:[], lastSync:null });

    async function sharedLoad(){ try{ const r=await window.storage.get(STORAGE_KEY,true); return r?JSON.parse(r.value):null; }catch{ return null; } }
    async function sharedSave(d){ try{ await window.storage.set(STORAGE_KEY,JSON.stringify({...d,lastSync:new Date().toISOString()}),true); }catch{} }

    const card={background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,padding:"14px 16px",marginBottom:10};
    const inp={width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none",background:"#fff",color:"#111827"};
    const PRI={padding:"8px 16px",borderRadius:8,border:"none",background:"#111827",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500,fontFamily:"inherit"};
    const SEC={padding:"8px 16px",borderRadius:8,border:"1px solid #d1d5db",background:"#fff",color:"#374151",cursor:"pointer",fontSize:13,fontFamily:"inherit"};

    const CityBadge=({city})=>{const c=cityOf(city);return <span style={{fontSize:11,padding:"2px 8px",borderRadius:999,background:c.bg,color:c.text,border:`1px solid ${c.border}40`,fontWeight:500,marginLeft:6}}>{city}</span>;};
    const MapBtn=({name,lat,lng})=>{const url=lat&&lng?`https://www.google.com/maps?q=${lat},${lng}`:`https://www.google.com/maps/search/${encodeURIComponent((name||"")+" Japan")}`;return <a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#2563eb",textDecoration:"none"}}>📍 Karte</a>;};
    const PriceTag=({jpy,eur})=>{if(!jpy&&!eur)return null;const j=jpy||Math.round(eur*EUR_JPY);const e=eur||(jpy/EUR_JPY).toFixed(0);return <span style={{fontSize:12,color:"#6b7280"}}>¥{Number(j).toLocaleString()} <span style={{opacity:.6}}>≈ €{Number(e).toFixed(0)}</span></span>;};
    const F=({label,children,half})=>(<div style={{marginBottom:10,flex:half?"1 1 calc(50% - 4px)":"1 1 100%",minWidth:half?0:undefined}}><label style={{display:"block",fontSize:11,color:"#6b7280",marginBottom:3}}>{label}</label>{children}</div>);

    function Panel({title,onClose,children}){
      return <div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:14,padding:20,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontWeight:500,fontSize:15,color:"#111827"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#9ca3af",lineHeight:1,padding:0}}>✕</button>
        </div>
        {children}
      </div>;
    }

    // ── PARSER ────────────────────────────────────────────────────────────────
    // Parses the structured Claude output format into an app entry object.
    // Returns { type, data } or null if format not recognized.
    function parseClaudeText(raw) {
      if (!raw || !raw.trim()) return null;
      const lines = raw.trim().split("\n").map(l => l.trim()).filter(Boolean);
      if (!lines.length) return null;

      // First line must be a type tag: #aktivität #restaurant #hotel #flug #tag
      const typeLine = lines[0].toLowerCase();
      const typeMap = {
        "#aktivität": "activity", "#aktivitaet": "activity", "#aktivitat": "activity",
        "#restaurant": "restaurant", "#cafe": "restaurant", "#café": "restaurant",
        "#hotel": "hotel", "#unterkunft": "hotel",
        "#flug": "flight",
        "#tag": "dayentry", "#tageseintrag": "dayentry",
      };
      const type = typeMap[typeLine];
      if (!type) return null;

      // Parse key: value lines
      const kv = {};
      lines.slice(1).forEach(line => {
        const col = line.indexOf(":");
        if (col === -1) return;
        const key = line.slice(0, col).trim().toLowerCase()
          .replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ä/g,"ae")
          .replace(/\s+/g,"_");
        const val = line.slice(col + 1).trim();
        if (val && val !== "–" && val !== "-") kv[key] = val;
      });

      const cityNorm = v => {
        if (!v) return "Tokyo";
        const l = v.toLowerCase();
        if (l.includes("osaka")) return "Osaka";
        if (l.includes("kyoto")) return "Kyoto";
        if (l.includes("atami")) return "Atami";
        if (l.includes("tokyo") || l.includes("tokio")) return "Tokyo";
        return v;
      };

      const tagNorm = v => {
        if (!v) return "culture";
        const l = v.toLowerCase();
        if (l.includes("temple") || l.includes("tempel") || l.includes("schrein") || l.includes("shrine")) return "temple";
        if (l.includes("nature") || l.includes("natur") || l.includes("park")) return "nature";
        if (l.includes("food") || l.includes("essen") || l.includes("cafe") || l.includes("café") || l.includes("restaurant")) return "food";
        if (l.includes("shop")) return "shopping";
        if (l.includes("transport") || l.includes("bahn") || l.includes("zug") || l.includes("bus")) return "transport";
        if (l.includes("hotel") || l.includes("unterkunft") || l.includes("hostel")) return "hotel";
        if (l.includes("flight") || l.includes("flug")) return "flight";
        return "culture";
      };

      const dayIdFromText = v => {
        if (!v) return null;
        // Try numeric first
        const num = parseInt(v);
        if (!isNaN(num) && num >= 0 && num <= 16) return num;
        // Try to match date string like "12.05" or "12. Mai" or city+slot
        const lower = v.toLowerCase();
        for (let i = 0; i < TRIP_DAYS.length; i++) {
          const d = TRIP_DAYS[i];
          if (lower.includes(d.date) || lower.includes(d.label.toLowerCase())) return i;
          // match "12.05" style
          const parts = d.date.split("-");
          if (lower.includes(`${parts[2]}.${parts[1]}`)) return i;
        }
        return null;
      };

      if (type === "activity") {
        return { type: "activity", data: {
          name: kv["name"] || "",
          city: cityNorm(kv["stadt"] || kv["city"]),
          tag: tagNorm(kv["kategorie"] || kv["tag"] || kv["category"]),
          address: kv["adresse"] || kv["address"] || "",
          lat: kv["lat"] || kv["latitude"] || "",
          lng: kv["lng"] || kv["longitude"] || kv["lon"] || "",
          openHours: kv["oeffnungszeiten"] || kv["oeeffnungszeiten"] || kv["opening_hours"] || kv["oeffnungszeit"] || "",
          closedDay: kv["ruhetag"] || kv["closed"] || kv["geschlossen"] || "",
          priceJPY: kv["preis"] || kv["preis_jpy"] || kv["eintrittspreis"] || kv["eintritt"] || "",
          note: kv["notiz"] || kv["note"] || kv["hinweis"] || "",
        }};
      }

      if (type === "restaurant") {
        return { type: "restaurant", data: {
          name: kv["name"] || "",
          city: cityNorm(kv["stadt"] || kv["city"]),
          address: kv["adresse"] || kv["address"] || "",
          lat: kv["lat"] || "",
          lng: kv["lng"] || kv["lon"] || "",
          openHours: kv["oeffnungszeiten"] || kv["opening_hours"] || kv["oeffnungszeit"] || "",
          closedDay: kv["ruhetag"] || kv["closed"] || "",
          priceJPY: kv["preis"] || kv["preis_jpy"] || kv["preis_pro_person"] || "",
          note: kv["notiz"] || kv["note"] || "",
          reserved: ["ja","yes","true"].includes((kv["reservierung"] || kv["reservation"] || "").toLowerCase()),
        }};
      }

      if (type === "hotel") {
        return { type: "hotel", data: {
          name: kv["name"] || "",
          city: cityNorm(kv["stadt"] || kv["city"]),
          address: kv["adresse"] || kv["address"] || "",
          lat: kv["lat"] || "",
          lng: kv["lng"] || kv["lon"] || "",
          checkin: kv["checkin"] || kv["check_in"] || kv["anreise"] || "",
          checkout: kv["checkout"] || kv["check_out"] || kv["abreise"] || "",
          nights: kv["naechte"] || kv["nights"] || kv["nächte"] || "",
          priceJPY: kv["preis"] || kv["preis_jpy"] || kv["preis_pro_nacht"] || "",
          note: kv["notiz"] || kv["note"] || "",
        }};
      }

      if (type === "flight") {
        return { type: "flight", data: {
          flightNumber: kv["flugnummer"] || kv["flight_number"] || kv["flug"] || "",
          airline: kv["airline"] || kv["fluggesellschaft"] || "",
          from: kv["von"] || kv["abflug"] || kv["from"] || "",
          to: kv["nach"] || kv["ankunft"] || kv["to"] || "",
          dep: kv["abflugzeit"] || kv["dep"] || kv["abflug_uhrzeit"] || "",
          arr: kv["ankunftszeit"] || kv["arr"] || kv["ankunft_uhrzeit"] || "",
          dur: kv["dauer"] || kv["dur"] || kv["flugdauer"] || "",
          aircraft: kv["flugzeug"] || kv["aircraft"] || kv["flugzeugtyp"] || "",
          layover: kv["zwischenstopp"] || kv["layover"] || kv["stopp"] || "",
          date: kv["datum"] || kv["date"] || "",
          status: "scheduled",
          note: kv["notiz"] || kv["note"] || "",
        }};
      }

      if (type === "dayentry") {
        const rawDay = kv["tag"] || kv["day"] || kv["datum"] || kv["reisetag"] || "";
        const dayId = dayIdFromText(rawDay) ?? 0;
        return { type: "dayentry", data: {
          title: kv["titel"] || kv["name"] || kv["title"] || "",
          dayId,
          time: kv["uhrzeit"] || kv["time"] || kv["zeit"] || "",
          tag: tagNorm(kv["kategorie"] || kv["tag"] || kv["category"]),
          note: kv["notiz"] || kv["note"] || "",
        }};
      }

      return null;
    }

    // ── PASTE IMPORTER COMPONENT ──────────────────────────────────────────────
    function PasteImporter({ onImport }) {
      const [open, setOpen] = useState(false);
      const [text, setText] = useState("");
      const [preview, setPreview] = useState(null);
      const [error, setError] = useState("");
      const taRef = useRef();

      const parse = (val) => {
        setError("");
        if (!val.trim()) { setPreview(null); return; }
        const result = parseClaudeText(val);
        if (!result) {
          setPreview(null);
          setError("Format nicht erkannt. Stelle sicher, dass die erste Zeile z.B. #aktivität ist.");
        } else {
          setPreview(result);
        }
      };

      const handleChange = (e) => { setText(e.target.value); parse(e.target.value); };

      const confirm = () => {
        if (!preview) return;
        onImport(preview);
        setText(""); setPreview(null); setError(""); setOpen(false);
      };

      const typeLabel = { activity:"Aktivität", restaurant:"Restaurant", hotel:"Unterkunft", flight:"Flug", dayentry:"Tageseintrag" };
      const typeColor = { activity:"#ef4444", restaurant:"#f59e0b", hotel:"#94a3b8", flight:"#38bdf8", dayentry:"#a855f7" };

      const previewTag = preview?.type === "activity" ? tagOf(preview.data.tag) :
                         preview?.type === "restaurant" ? tagOf("food") :
                         preview?.type === "hotel" ? tagOf("hotel") :
                         preview?.type === "flight" ? tagOf("flight") :
                         preview?.type === "dayentry" ? tagOf(preview.data.tag) : null;

      return (
        <div style={{marginBottom: 14}}>
          {!open ? (
            <button
              onClick={()=>{setOpen(true); setTimeout(()=>taRef.current?.focus(),50);}}
              style={{width:"100%",padding:"10px 16px",borderRadius:10,border:"1.5px dashed #d1d5db",background:"#fafafa",color:"#6b7280",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}
            >
              <span style={{fontSize:16}}>📋</span>
              Claude-Output hier einfügen
            </button>
          ) : (
            <div style={{background:"#fff",border:"1.5px solid #a855f7",borderRadius:12,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontWeight:500,fontSize:14,color:"#581c87"}}>📋 Claude-Output einfügen</span>
                <button onClick={()=>{setOpen(false);setText("");setPreview(null);setError("");}} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:"#9ca3af",padding:0}}>✕</button>
              </div>
              <textarea
                ref={taRef}
                value={text}
                onChange={handleChange}
                placeholder={`#aktivität\nname: Fushimi Inari Taisha\nstadt: Kyoto\nkategorie: temple\n…`}
                style={{...inp, height:140, resize:"vertical", fontFamily:"monospace", fontSize:12, marginBottom:10}}
              />
              {error && <div style={{fontSize:12,color:"#dc2626",marginBottom:8}}>{error}</div>}
              {preview && previewTag && (
                <div style={{background:previewTag.bg, border:`1px solid ${previewTag.border}60`, borderRadius:10, padding:"12px 14px", marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:18}}>{previewTag.emoji}</span>
                    <span style={{fontWeight:500,fontSize:14,color:"#111827"}}>{preview.data.name||preview.data.title||preview.data.flightNumber||"—"}</span>
                    <span style={{fontSize:11,padding:"2px 8px",borderRadius:999,background:"#fff",color:typeColor[preview.type],fontWeight:500,border:`1px solid ${typeColor[preview.type]}40`}}>{typeLabel[preview.type]}</span>
                    {preview.data.city && <CityBadge city={preview.data.city}/>}
                    {preview.type==="dayentry" && <span style={{fontSize:11,color:"#6b7280",marginLeft:4}}>{TRIP_DAYS[preview.data.dayId]?.label}</span>}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px 16px",fontSize:12,color:"#374151"}}>
                    {preview.data.address && <span>📍 {preview.data.address}</span>}
                    {preview.data.openHours && <span>⏰ {preview.data.openHours}</span>}
                    {preview.data.closedDay && <span>🚫 Ruhetag: {preview.data.closedDay}</span>}
                    {preview.data.priceJPY && <span>¥ {Number(preview.data.priceJPY).toLocaleString()}</span>}
                    {preview.data.from && <span>✈ {preview.data.from} → {preview.data.to}</span>}
                    {preview.data.dep && <span>🕐 {preview.data.dep} → {preview.data.arr}</span>}
                    {preview.data.note && <span>💬 {preview.data.note}</span>}
                    {preview.data.time && <span>🕐 {preview.data.time}</span>}
                    {preview.data.checkin && <span>📅 {preview.data.checkin} – {preview.data.checkout}</span>}
                  </div>
                </div>
              )}
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={()=>{setOpen(false);setText("");setPreview(null);setError("");}} style={SEC}>Abbrechen</button>
                <button onClick={confirm} disabled={!preview} style={{...PRI,opacity:preview?1:0.4}}>✓ Speichern</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── CLAUDE TIP TAB ────────────────────────────────────────────────────────
    const FORMAT_EXAMPLES = {
      activity: `#aktivität
name: Fushimi Inari Taisha
stadt: Kyoto
kategorie: temple
adresse: 68 Fushimiinari Yabunouchicho, Fushimi

      restaurant: `#restaurant

lng: 135.5010
öffnungszeiten: 10:00–05:00

      hotel: `#hotel

lat: 34.6745
lng: 135.5023
checkin: 2026-05-12

      flight: `#flug
flugnummer: CX570
airline: Cathay Pacific
von: Frankfurt (FRA)
nach: Hongkong (HKG)
abflugzeit: 21:25
ankunftszeit: 15:45+1

      dayentry: `#tag
titel: Nishiki Market Besuch
reisetag: 4
uhrzeit: 10:00
kategorie: food
notiz: Probiere Takoyaki und Matcha-Snacks`,
    };

    const CLAUDE_PROMPTS = [
      { label:"Aktivität / Sehenswürdigkeit", cat:"activity", prompt:`Gib mir Infos zu folgendem Ort für meinen Japan-Reiseplaner. Antworte NUR in diesem Format, ohne Erklärung:

#aktivität

stadt: [Osaka/Kyoto/Atami/Tokyo]
kategorie: [temple/nature/shopping/culture/transport]
adresse: [Straße, Bezirk]

lng: [Längengrad als Zahl]
öffnungszeiten: [z.B. 09:00–17:00 oder 24 Stunden]
ruhetag: [Wochentag oder –]
preis: [Eintrittspreis in JPY oder 0]
notiz: [1 hilfreicher Tipp]

Ort: [ORT HIER EINGEBEN]` },
      { label:"Restaurant", cat:"restaurant", prompt:`Gib mir Infos zu diesem Restaurant in Japan für meinen Reiseplaner. Antworte NUR in diesem Format:

#restaurant
name: [vollständiger Name]
stadt: [Osaka/Kyoto/Atami/Tokyo]
adresse: [Straße, Bezirk]
lat: [Breitengrad]
lng: [Längengrad]
öffnungszeiten: [z.B. 11:00–22:00]
ruhetag: [Wochentag oder –]
preis: [typischer Preis pro Person in JPY]
reservierung: [ja/nein]
notiz: [1 hilfreicher Tipp]

Restaurant: [NAME HIER EINGEBEN]` },
      { label:"Hotel / Unterkunft", cat:"hotel", prompt:`Gib mir Infos zu diesem Hotel in Japan für meinen Reiseplaner. Antworte NUR in diesem Format:

#hotel
name: [vollständiger Name]
stadt: [Osaka/Kyoto/Atami/Tokyo]
adresse: [Straße, Bezirk]
lat: [Breitengrad]
lng: [Längengrad]
checkin: [Datum als YYYY-MM-DD]
checkout: [Datum als YYYY-MM-DD]
nächte: [Anzahl]
preis: [Preis pro Nacht in JPY]
notiz: [1 hilfreicher Tipp]

Hotel: [NAME HIER EINGEBEN]` },
      { label:"Flug", cat:"flight", prompt:`Gib mir die Flugdaten für folgenden Flug. Antworte NUR in diesem Format:

#flug
flugnummer: [z.B. CX570]
airline: [Fluggesellschaft]
von: [Abflughafen mit Code]
nach: [Zielflughafen mit Code]

    // ── Timeline ──────────────────────────────────────────────────────────────
    function Timeline({dayId,data,onAdd,onRemove}){
      const day=TRIP_DAYS[dayId]; const all=[];
      (data.flights||[]).forEach(f=>{
        if(f.date===day.date) all.push({time:f.dep||"",emoji:"✈",label:`${f.flightNumber}: ${f.from} → ${f.to}`,sub:f.dur,color:"#0284c7",bg:"#e0f2fe"});
        else if(f.arr?.includes("+1")&&f.date){const nd=new Date(f.date+"T00:00");nd.setDate(nd.getDate()+1);if(nd.toISOString().slice(0,10)===day.date) all.push({time:f.arr.replace("+1","").trim(),emoji:"✈",label:`${f.flightNumber} landet: ${f.to}`,sub:`Ankunft aus ${f.from}`,color:"#0284c7",bg:"#e0f2fe"});}
      });
      (data.hotels||[]).filter(h=>h.checkin===day.date).forEach(h=>all.push({time:"15:00",emoji:"🏨",label:`Check-in: ${h.name}`,sub:h.city,color:"#475569",bg:"#f1f5f9"}));
      (data.hotels||[]).filter(h=>h.checkout===day.date).forEach(h=>all.push({time:"11:00",emoji:"🏨",label:`Check-out: ${h.name}`,sub:h.city,color:"#475569",bg:"#f1f5f9"}));
      (data.days||[]).filter(e=>e.dayId===dayId).forEach(e=>{
        const t=tagOf(e.tag);
        const linked=(data.activities||[]).find(a=>a.id===e.linkedId)||(data.restaurants||[]).find(r=>r.id===e.linkedId);
        all.push({time:e.time||"",emoji:t.emoji,label:e.title,sub:e.note,color:t.color,bg:t.bg,linked,id:e.id,manual:true});
      });
      all.sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
      const slotOf=t=>!t||t<"12:00"?0:t<"17:00"?1:2;
      const slots=[["🌅","Vormittag"],["☀️","Nachmittag"],["🌙","Abend"]];
      const grouped=[all.filter(e=>slotOf(e.time)===0),all.filter(e=>slotOf(e.time)===1),all.filter(e=>slotOf(e.time)===2)];
      return <div>
        {grouped.map((items,s)=><div key={s} style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:500,color:"#6b7280"}}>{slots[s][0]} {slots[s][1]}</span>
            <div style={{flex:1,height:1,background:"#f3f4f6"}}/>
          </div>
          {items.length===0&&<div style={{fontSize:12,color:"#d1d5db",paddingLeft:16,marginBottom:4}}>Keine Einträge</div>}
          {items.map((e,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
            <div style={{minWidth:42,textAlign:"right",paddingTop:8,fontSize:12,color:"#9ca3af",fontWeight:500}}>{e.time||"—"}</div>
            <div style={{width:2,background:e.color,borderRadius:1,alignSelf:"stretch",margin:"4px 0",flexShrink:0}}/>
            <div style={{flex:1,background:e.bg,borderRadius:8,padding:"8px 11px",border:`1px solid ${e.color}25`}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:14}}>{e.emoji}</span>
                <span style={{fontSize:13,fontWeight:500,color:"#111827"}}>{e.label}</span>
                {e.linked&&<MapBtn name={e.linked.name} lat={e.linked.lat} lng={e.linked.lng}/>}
                {e.manual&&<button onClick={()=>onRemove(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:12,marginLeft:"auto",padding:0}}>✕</button>}
              </div>
              {e.sub&&<div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{e.sub}</div>}
              {e.linked?.openHours&&<div style={{fontSize:11,color:"#059669",marginTop:3}}>⏰ {e.linked.openHours}{e.linked.closedDay?` · ${e.linked.closedDay}`:""}</div>}
            </div>
          </div>)}
        </div>)}
        <button onClick={onAdd} style={{...SEC,width:"100%",fontSize:12}}>+ Eintrag manuell hinzufügen</button>
      </div>;
    }

      const set=(k,v)=>setForm(p=>({...p,[k]:v}));
      const DOC_TYPES={ticket:"🎫 Ticket",reservation:"📋 Reservierung",document:"📄 Dokument",insurance:"🛡 Versicherung",other:"📎 Sonstiges"};
      const handleFile=e=>{const file=e.target.files[0];if(!file)return;if(file.size>1.5*1024*1024){alert("Max 1,5 MB");return;}const r=new FileReader();r.onload=ev=>set("dataURL",ev.target.result);r.readAsDataURL(file);};
      return <div>
        <PasteImporter onImport={onImport}/>
        {preview&&<div style={{background:"rgba(0,0,0,0.8)",borderRadius:12,padding:16,marginBottom:14,textAlign:"center"}}><button onClick={()=>setPreview(null)} style={{...SEC,marginBottom:10}}>Schließen</button>{preview.startsWith("data:image")?<img src={preview} style={{maxWidth:"100%",borderRadius:8}} alt="Vorschau"/>:<iframe src={preview} style={{width:"100%",height:500,border:"none",borderRadius:8}} title="Dokument"/>}</div>}
        {!open&&<button style={{...SEC,width:"100%",marginBottom:12}} onClick={()=>setOpen(true)}>+ Dokument / Ticket hinzufügen</button>}
        {open&&<Panel title="Dokument hinzufügen" onClose={()=>setOpen(false)}>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            <F label="Name"><input style={inp} value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Buchungsbestätigung Hostel Tokyo"/></F>
            <F label="Typ" half><select style={inp} value={form.type} onChange={e=>set("type",e.target.value)}>{Object.entries(DOC_TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></F>
            <F label="Reisetag" half><select style={inp} value={form.dayId||""} onChange={e=>set("dayId",e.target.value)}><option value="">— keinen —</option>{TRIP_DAYS.map(d=><option key={d.id} value={d.id}>{d.label} – {d.city}</option>)}</select></F>
            <F label="Datei (max 1,5 MB)"><input type="file" accept="image/*,application/pdf" onChange={handleFile} style={{fontSize:12,color:"#6b7280"}}/></F>
            <F label="Notiz"><textarea style={{...inp,height:48,resize:"vertical"}} value={form.note} onChange={e=>set("note",e.target.value)}/></F>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={SEC} onClick={()=>setOpen(false)}>Abbrechen</button><button style={PRI} onClick={()=>{if(form.name.trim()){onAdd(form);setOpen(false);setForm({name:"",type:"ticket",dayId:"",note:"",dataURL:""});}}}>Speichern</button></div>
        </Panel>}
        {(docs||[]).length===0&&!open&&<div style={{textAlign:"center",color:"#9ca3af",padding:"2rem",fontSize:13}}>Noch keine Dokumente gespeichert.</div>}
        {(docs||[]).map(d=>{const day=d.dayId!==""&&d.dayId!=null?TRIP_DAYS[d.dayId]:null;const ico=DOC_TYPES[d.type]?.split(" ")[0]||"📎";return <div key={d.id} style={{...card,display:"flex",alignItems:"center",gap:12}}><div style={{fontSize:24,flexShrink:0}}>{ico}</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500,fontSize:13}}>{d.name}</div><div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{DOC_TYPES[d.type]||d.type}{day&&<span> · 📅 {day.label}</span>}</div>{d.note&&<div style={{fontSize:12,color:"#9ca3af",marginTop:3}}>{d.note}</div>}</div><div style={{display:"flex",gap:6,flexShrink:0}}>{d.dataURL&&<button onClick={()=>setPreview(d.dataURL)} style={{...SEC,fontSize:12,padding:"4px 10px"}}>Ansehen</button>}<button onClick={()=>onDelete(d.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13}}>✕</button></div></div>;})}
      </div>;
    }

    // ── Flight Card ───────────────────────────────────────────────────────────
    function FlightCard({f,onEdit,onDelete}){
      const st=STATUS_COLORS[f.status]||STATUS_COLORS.scheduled;
      return <div style={{...card,borderLeft:"3px solid #0ea5e9"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <span style={{background:"#0f172a",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:13,fontWeight:500}}>{f.flightNumber||"—"}</span>
          {f.airline&&<span style={{fontSize:12,color:"#6b7280"}}>{f.airline}</span>}
          {f.date&&<span style={{fontSize:11,color:"#9ca3af",marginLeft:"auto"}}>{new Date(f.date+"T00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})}</span>}
          <span style={{fontSize:11,padding:"2px 8px",borderRadius:999,background:st.bg,color:st.color,fontWeight:500}}>{STATUS_LABELS[f.status]||f.status}</span>
          <button onClick={()=>onEdit(f)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:2}}>✎</button>
          <button onClick={()=>onDelete(f.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:2}}>✕</button>
        </div>
        <div style={{display:"flex",alignItems:"center"}}>
          <div style={{textAlign:"center",minWidth:110}}><div style={{fontSize:22,fontWeight:500}}>{f.dep||"—"}</div><div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{f.from||"—"}</div></div>
          <div style={{flex:1,padding:"0 10px",textAlign:"center"}}>
            {f.dur&&<div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{f.dur}</div>}
            <div style={{borderTop:"2px dashed #e5e7eb",position:"relative"}}><span style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",fontSize:16,background:"#fff",padding:"0 4px"}}>✈</span></div>
            {f.layover&&<div style={{fontSize:11,color:"#d97706",marginTop:8}}>⏸ {f.layover}</div>}
          </div>
          <div style={{textAlign:"center",minWidth:110}}><div style={{fontSize:22,fontWeight:500}}>{f.arr||"—"}</div><div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{f.to||"—"}</div></div>
        </div>
        {(f.aircraft||f.note)&&<div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #f3f4f6",fontSize:11,color:"#9ca3af"}}>{f.aircraft&&<span>✈ {f.aircraft}  </span>}{f.note&&<span>{f.note}</span>}</div>}
      </div>;
    }

    // ── MAIN ─────────────────────────────────────────────────────────────────
    const TABS=[
      {id:"claude", label:"✨ Claude-Tipps"},
      {id:"days",   label:"📅 Tagesplanung"},
      {id:"flights",label:"✈ Flüge"},
      {id:"hotels", label:"🏨 Unterkünfte"},
      {id:"rests",  label:"🍜 Restaurants"},
      {id:"acts",   label:"🗂 Aktivitäten"},
      {id:"map",    label:"🗺 Karte"},
      {id:"currency",label:"💱 Währung"},
      {id:"docs",   label:"📎 Dokumente"},
    ];

    function App(){
      const [tab,setTab]=useState("claude");
      const [data,setData]=useState(blank());
      const [panel,setPanel]=useState(null);
      const [selDay,setSelDay]=useState(0);
      const [filterTag,setFilterTag]=useState(null);
      const [syncing,setSyncing]=useState(false);
      const [syncOk,setSyncOk]=useState(false);
      const [importSuccess,setImportSuccess]=useState("");

      const load=useCallback(async()=>{ const d=await sharedLoad(); if(d) setData(d); },[]);
      useEffect(()=>{ load(); const t=setInterval(load,25000); return()=>clearInterval(t); },[load]);

      const save=async next=>{ setSyncing(true);setSyncOk(false);setData(next);await sharedSave(next);setSyncing(false);setSyncOk(true);setTimeout(()=>setSyncOk(false),3000); };
      const upsert=(col,item)=>{ const exists=(data[col]||[]).find(x=>x.id===item.id); save({...data,[col]:exists?data[col].map(x=>x.id===item.id?item:x):[...(data[col]||[]),{...item,id:item.id||Date.now()}]}); setPanel(null); };
      const remove=(col,id)=>{ if(!confirm("Löschen?"))return; save({...data,[col]:(data[col]||[]).filter(x=>x.id!==id)}); };
      const openPanel=(type,item=null)=>setPanel({type,item});
      const promote=act=>{ setTab("days"); setTimeout(()=>openPanel("dayentry",{title:act.name,tag:act.tag,linkedId:act.id,note:act.note||""}),50); };

      const saveDayEntry=(entry)=>{
        const id=entry.id||Date.now();
        const newEntry={...entry,id};
        let next={...data};
        const existsDay=(next.days||[]).find(x=>x.id===id);
        next={...next,days:existsDay?next.days.map(x=>x.id===id?newEntry:x):[...(next.days||[]),newEntry]};
        const actTags=["temple","nature","shopping","culture","transport","food"];
        if(!entry.linkedId&&actTags.includes(entry.tag)&&entry.title.trim()){
          const city=TRIP_DAYS[entry.dayId]?.city||"Tokyo";
          const actId=id+1;
          const act={id:actId,name:entry.title,city,tag:entry.tag,note:entry.note||"",address:"",lat:"",lng:"",openHours:"",closedDay:"",priceJPY:"",priceEUR:"",_fromDay:id};
          const linked={...newEntry,linkedId:actId};
          next={...next,days:next.days.map(x=>x.id===id?linked:x),activities:[...(next.activities||[]),act]};
        }
        save(next);
        setPanel(null);
      };

      // ── IMPORT from PasteImporter ─────────────────────────────────────────
      const handleImport = ({ type, data: d }) => {
        const id = Date.now();
        let next = { ...data };
        const colMap = { activity:"activities", restaurant:"restaurants", hotel:"hotels", flight:"flights", dayentry:"days" };
        const col = colMap[type];
        if (!col) return;

        const actTags = ["temple","nature","shopping","culture","transport","food"];

        if (type === "dayentry") {
          const entry = { ...d, id };
          next = { ...next, days: [...(next.days||[]), entry] };
          // Bidirectional: also create activity if tag matches
          if (actTags.includes(d.tag) && d.title?.trim()) {
            const city = TRIP_DAYS[d.dayId]?.city || "Tokyo";
            const actId = id + 1;
            const act = { id: actId, name: d.title, city, tag: d.tag, note: d.note||"", address:"", lat:"", lng:"", openHours:"", closedDay:"", priceJPY:"", priceEUR:"" };
            next = { ...next, activities: [...(next.activities||[]), act], days: next.days.map(x => x.id===id ? {...x, linkedId: actId} : x) };
          }
        } else {
          next = { ...next, [col]: [...(next[col]||[]), { ...d, id }] };
        }

        save(next);
        const label = { activity:"Aktivität", restaurant:"Restaurant", hotel:"Unterkunft", flight:"Flug", dayentry:"Tageseintrag" }[type];
        setImportSuccess(`✓ ${label} gespeichert!`);
        setTimeout(() => setImportSuccess(""), 3000);
      };

      const tabBtn=active=>({padding:"6px 12px",borderRadius:8,border:active?"1.5px solid #111827":"1px solid #e5e7eb",background:active?"#111827":"#fff",color:active?"#fff":"#6b7280",cursor:"pointer",fontSize:12,fontWeight:active?500:400,whiteSpace:"nowrap",fontFamily:"inherit"});

      return <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#111827",background:"#f9fafb",minHeight:"100vh",fontSize:14}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"10px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
          <span style={{fontSize:20}}>🗾</span>
          <div><div style={{fontWeight:500,fontSize:15}}>Japan 2026</div><div style={{fontSize:11,color:"#9ca3af"}}>12.–28. Mai · 2 Personen</div></div>
          <div style={{flex:1}}/>
          <div style={{fontSize:11,fontWeight:500,color:importSuccess?"#059669":syncing?"#d97706":syncOk?"#059669":"#9ca3af"}}>
            {importSuccess||( syncing?"⟳ Sync…":syncOk?"✓ Gespeichert":"Cloud-Sync aktiv")}
          </div>
        </div>

        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"8px 14px",display:"flex",gap:5,overflowX:"auto"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setPanel(null);}} style={tabBtn(tab===t.id)}>{t.label}</button>)}
        </div>

        {(tab==="map"||tab==="acts")&&<div style={{background:"#fff",borderBottom:"1px solid #f3f4f6",padding:"7px 14px",display:"flex",gap:5,overflowX:"auto"}}>
          <button onClick={()=>setFilterTag(null)} style={{padding:"3px 10px",borderRadius:999,border:`1px solid ${!filterTag?"#111827":"#e5e7eb"}`,background:!filterTag?"#111827":"#fff",color:!filterTag?"#fff":"#6b7280",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Alle</button>
          {TAGS.map(t=><button key={t.id} onClick={()=>setFilterTag(filterTag===t.id?null:t.id)} style={{padding:"3px 10px",borderRadius:999,border:`1px solid ${filterTag===t.id?t.border:"#e5e7eb"}`,background:filterTag===t.id?t.bg:"#fff",color:filterTag===t.id?t.color:"#6b7280",cursor:"pointer",fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.emoji} {t.label}</button>)}
        </div>}

        <div style={{padding:"14px 16px",maxWidth:780,margin:"0 auto"}}>

          {tab==="claude"&&<ClaudeTab onImport={handleImport}/>}

          {tab==="days"&&<div>
            <PasteImporter onImport={handleImport}/>
            <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:12,paddingBottom:2}}>
              {TRIP_DAYS.map(d=>{const cs=cityOf(d.city);const active=selDay===d.id;return <button key={d.id} onClick={()=>{setSelDay(d.id);setPanel(null);}} style={{flexShrink:0,padding:"6px 10px",borderRadius:8,border:`1px solid ${active?cs.border:"#e5e7eb"}`,background:active?cs.bg:"#fff",color:active?cs.text:"#6b7280",cursor:"pointer",fontSize:11,fontWeight:active?500:400,fontFamily:"inherit"}}>{d.label}</button>;})}
            </div>
            {panel?.type==="dayentry"&&<Panel title="Eintrag hinzufügen" onClose={()=>setPanel(null)}><DayEntryForm initial={{...panel.item,dayId:panel.item?.dayId??selDay}} data={data} onSave={saveDayEntry} onClose={()=>setPanel(null)}/></Panel>}
            <div style={{...card,padding:"16px 18px"}}>
              <div style={{display:"flex",alignItems:"center",marginBottom:14}}><span style={{fontWeight:500,fontSize:15}}>{TRIP_DAYS[selDay].label}</span><CityBadge city={TRIP_DAYS[selDay].city}/></div>
              <Timeline dayId={selDay} data={data} onAdd={()=>openPanel("dayentry",{dayId:selDay})} onRemove={id=>remove("days",id)}/>
            </div>
          </div>}

          {tab==="flights"&&<div>
            <PasteImporter onImport={handleImport}/>
            {panel?.type==="flight"&&<Panel title={panel.item?.id?"Bearbeiten":"Hinzufügen"} onClose={()=>setPanel(null)}><FlightForm initial={panel.item} onSave={f=>upsert("flights",f)} onClose={()=>setPanel(null)}/></Panel>}
            {(data.flights||[]).length===0&&!panel&&<div style={{textAlign:"center",padding:"3rem 1rem",color:"#9ca3af"}}><div style={{fontSize:36,marginBottom:10}}>✈</div><div style={{fontSize:13}}>Noch keine Flüge.</div></div>}
            {(data.flights||[]).map(f=><FlightCard key={f.id} f={f} onEdit={x=>openPanel("flight",x)} onDelete={id=>remove("flights",id)}/>)}
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("flight")}>+ Flug manuell hinzufügen</button>}
          </div>}

          {tab==="hotels"&&<div>
            <PasteImporter onImport={handleImport}/>
            {panel?.type==="hotel"&&<Panel title={panel.item?.id?"Bearbeiten":"Hinzufügen"} onClose={()=>setPanel(null)}><PlaceForm initial={panel.item} type="hotel" onSave={h=>upsert("hotels",h)} onClose={()=>setPanel(null)}/></Panel>}
            {(data.hotels||[]).map(h=>{const cs=cityOf(h.city);return <div key={h.id} style={{...card,borderLeft:`3px solid ${cs.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",marginBottom:5}}><span style={{fontWeight:500,fontSize:14}}>🏨 {h.name}</span><CityBadge city={h.city}/></div>
                  {h.address&&<div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{h.address}</div>}
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:12,color:"#6b7280"}}>
                    {h.checkin&&<span>📅 {new Date(h.checkin+"T00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})} – {h.checkout&&new Date(h.checkout+"T00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})}</span>}
                    {h.nights&&<span>🌙 {h.nights} Nächte</span>}
                    {(h.priceJPY||h.priceEUR)&&<PriceTag jpy={h.priceJPY} eur={h.priceEUR}/>}
                  </div>
                  {h.note&&<div style={{fontSize:12,color:"#9ca3af",marginTop:5}}>{h.note}</div>}
                </div>
                <div style={{display:"flex",gap:6,marginLeft:8,flexShrink:0}}><MapBtn name={h.name} lat={h.lat} lng={h.lng}/><button onClick={()=>openPanel("hotel",h)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✎</button><button onClick={()=>remove("hotels",h.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✕</button></div>
              </div>
            </div>;})}
            {(data.hotels||[]).length===0&&!panel&&<div style={{textAlign:"center",padding:"2rem",color:"#9ca3af",fontSize:13}}>Noch keine Unterkünfte.</div>}
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("hotel")}>+ Unterkunft manuell hinzufügen</button>}
          </div>}

          {tab==="rests"&&<div>
            <PasteImporter onImport={handleImport}/>
            {panel?.type==="restaurant"&&<Panel title={panel.item?.id?"Bearbeiten":"Hinzufügen"} onClose={()=>setPanel(null)}><PlaceForm initial={panel.item} type="restaurant" onSave={r=>upsert("restaurants",r)} onClose={()=>setPanel(null)}/></Panel>}
            {(data.restaurants||[]).map(r=><div key={r.id} style={{...card,borderLeft:"3px solid #f59e0b"}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:4}}><span style={{fontWeight:500,fontSize:14}}>🍜 {r.name}</span><CityBadge city={r.city}/>{r.reserved&&<span style={{fontSize:11,padding:"2px 7px",borderRadius:999,background:"#d1fae5",color:"#065f46"}}>✓ Reserviert</span>}</div>
                  {(r.priceJPY||r.priceEUR)&&<div style={{marginBottom:4}}><PriceTag jpy={r.priceJPY} eur={r.priceEUR}/></div>}
                  {r.openHours&&<div style={{fontSize:11,color:"#059669"}}>⏰ {r.openHours}{r.closedDay?` · ${r.closedDay}`:""}</div>}
                  {r.note&&<div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>{r.note}</div>}
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8}}><MapBtn name={r.name} lat={r.lat} lng={r.lng}/><button onClick={()=>openPanel("restaurant",r)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✎</button><button onClick={()=>remove("restaurants",r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13,padding:0}}>✕</button></div>
              </div>
            </div>)}
            {(data.restaurants||[]).length===0&&!panel&&<div style={{textAlign:"center",padding:"2rem",color:"#9ca3af",fontSize:13}}>Noch keine Restaurants.</div>}
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("restaurant")}>+ Restaurant manuell hinzufügen</button>}
          </div>}

          {tab==="acts"&&<div>
            <PasteImporter onImport={handleImport}/>
            {panel?.type==="activity"&&<Panel title={panel.item?.id?"Bearbeiten":"Hinzufügen"} onClose={()=>setPanel(null)}><PlaceForm initial={panel.item} type="activity" onSave={a=>upsert("activities",a)} onClose={()=>setPanel(null)}/></Panel>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:10,marginBottom:12}}>
              {(data.activities||[]).filter(a=>!filterTag||a.tag===filterTag).map(a=>{const t=tagOf(a.tag);return <div key={a.id} style={{background:"#fff",border:`1px solid ${t.border}30`,borderRadius:12,padding:"12px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:18}}>{t.emoji}</span><div style={{display:"flex",gap:5}}><MapBtn name={a.name} lat={a.lat} lng={a.lng}/><button onClick={()=>openPanel("activity",a)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:12,padding:0}}>✎</button><button onClick={()=>remove("activities",a.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:12,padding:0}}>✕</button></div></div>
                <div style={{fontWeight:500,fontSize:13,marginBottom:4}}>{a.name}</div><CityBadge city={a.city}/>
                {a.openHours&&<div style={{fontSize:11,color:"#059669",marginTop:5}}>⏰ {a.openHours}{a.closedDay?` · ${a.closedDay}`:""}</div>}
                {(a.priceJPY||a.priceEUR)&&<div style={{marginTop:4}}><PriceTag jpy={a.priceJPY} eur={a.priceEUR}/></div>}
                {a.note&&<div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{a.note}</div>}
                <button onClick={()=>promote(a)} style={{...SEC,width:"100%",fontSize:11,padding:"5px 0",marginTop:8}}>📅 In Tagesplan</button>
              </div>;})}
              {(data.activities||[]).filter(a=>!filterTag||a.tag===filterTag).length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",color:"#9ca3af",padding:"2rem",fontSize:13}}>Noch keine Aktivitäten.</div>}
            </div>
            {!panel&&<button style={{...SEC,width:"100%"}} onClick={()=>openPanel("activity")}>+ Aktivität manuell hinzufügen</button>}
          </div>}

          {tab==="map"&&<MapTab data={data} filterTag={filterTag} onImport={handleImport}/>}
          {tab==="currency"&&<CurrencyTab onImport={handleImport}/>}
          {tab==="docs"&&<DocsTab docs={data.docs||[]} onAdd={d=>upsert("docs",d)} onDelete={id=>remove("docs",id)} onImport={handleImport}/>}
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
